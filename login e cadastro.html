<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintendo Account - Login / Cadastro</title>
    <style>
        :root {
            --nintendo-red: #e60012;
            --nintendo-dark: #1f1f1f;
            --bg-light: #f0f0f0;
            --text-color: #434343;
            --border-grey: #dcdcdc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
        }

        /* Container Principal */
        .auth-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        /* Logo Simulado da Nintendo */
        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-box {
            display: inline-block;
            background-color: var(--nintendo-red);
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            padding: 5px 25px;
            border-radius: 50px;
            letter-spacing: 2px;
        }

        /* Alternador de Abas (Tabs) */
        .tab-control {
            display: flex;
            border-bottom: 2px solid var(--border-grey);
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 1rem;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Classes utilitárias controladas por ID para demonstração visual */
        #tab-login.active, #tab-register.active {
            color: var(--nintendo-red);
            border-bottom: 3px solid var(--nintendo-red);
            margin-bottom: -2px;
        }

        /* Formulários */
        .auth-form {
            display: none; /* Escondido por padrão, JavaScript alterna */
            flex-direction: column;
            gap: 20px;
        }

        .auth-form.active {
            display: flex; /* Mostra apenas a aba ativa */
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .input-group input {
            padding: 14px;
            border: 1px solid var(--border-grey);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #f9f9f9;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: var(--nintendo-dark);
            background-color: #ffffff;
        }

        /* Botão Vermelho Clássico */
        .submit-btn {
            background-color: var(--nintendo-red);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
        }

        .submit-btn:hover {
            background-color: #be000e;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Links Úteis */
        .form-footer {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        .form-footer a {
            color: #0071e3;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-logo">
            <div class="logo-box">Nintendo</div>
        </div>

        <div class="tab-control">
            <div id="btn-login" class="tab-btn active" onclick="switchTab('login')">Fazer Login</div>
            <div id="btn-register" class="tab-btn" onclick="switchTab('register')">Criar Conta</div>
        </div>

        <form id="form-login" class="auth-form active" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="login-email">E-mail ou ID de usuário</label>
                <input type="text" id="login-email" placeholder="exemplo@email.com" required>
            </div>
            <div class="input-group">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="submit-btn">Iniciar sessão</button>
            <div class="form-footer">
                <a href="#esqueceu">Esqueceu sua senha?</a>
            </div>
        </form>

        <form id="form-register" class="auth-form" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="reg-username">Apelido (ID de Usuário)</label>
                <input type="text" id="reg-username" placeholder="Como quer ser chamado" required>
            </div>
            <div class="input-group">
                <label for="reg-email">Endereço de e-mail</label>
                <input type="email" id="reg-email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label for="reg-password">Senha</label>
                <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required>
            </div>
            <button type="submit" class="submit-btn">Criar conta</button>
            <div class="form-footer">
                Ao continuar, você aceita os <a href="#termos">Termos de Serviço</a>.
            </div>
        </form>
    </div>

    <script>
        function switchTab(type) {
            const btnLogin = document.getElementById('btn-login');
            const btnRegister = document.getElementById('btn-register');
            const formLogin = document.getElementById('form-login');
            const formRegister = document.getElementById('form-register');

            if (type === 'login') {
                btnLogin.classList.add('active');
                formLogin.classList.add('active');
                btnRegister.classList.remove('active');
                formRegister.classList.remove('active');
            } else {
                btnRegister.classList.add('active');
                formRegister.classList.add('active');
                btnLogin.classList.remove('active');
                formLogin.classList.remove('active');
            }
        }
    </script>

</body>
</html>
