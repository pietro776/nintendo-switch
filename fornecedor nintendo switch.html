<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Fornecedor - Nintendo Switch</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f2f2f2;
}

header{
    background:#e60012;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#222;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

nav a:hover{
    color:#ff4d4d;
}

.container{
    width:90%;
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    color:#e60012;
    text-align:center;
}

label{
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#e60012;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#b3000e;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>

</head>
<body>

<header>
    <h1>Loja Nintendo Switch</h1>
    <p>Cadastro de Fornecedor</p>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Produtos</a>
    <a href="#">Fornecedores</a>
    <a href="#">Clientes</a>
    <a href="#">Contato</a>
</nav>

<div class="container">

    <h2>Novo Fornecedor</h2>

    <form>

        <label>Nome da Empresa</label>
        <input type="text" placeholder="Digite o nome da empresa">

        <label>CNPJ</label>
        <input type="text" placeholder="00.000.000/0001-00">

        <label>Responsável</label>
        <input type="text" placeholder="Nome do responsável">

        <label>E-mail</label>
        <input type="email" placeholder="empresa@email.com">

        <label>Telefone</label>
        <input type="text" placeholder="(00) 00000-0000">

        <label>Endereço</label>
        <input type="text" placeholder="Rua, número, bairro">

        <label>Cidade</label>
        <input type="text" placeholder="Cidade">

        <label>Estado</label>
        <select>
            <option>Selecione</option>
            <option>AC</option>
            <option>AL</option>
            <option>AP</option>
            <option>AM</option>
            <option>BA</option>
            <option>CE</option>
            <option>DF</option>
            <option>ES</option>
            <option>GO</option>
            <option>MA</option>
            <option>MT</option>
            <option>MS</option>
            <option>MG</option>
            <option>PA</option>
            <option>PB</option>
            <option>PR</option>
            <option>PE</option>
            <option>PI</option>
            <option>RJ</option>
            <option>RN</option>
            <option>RS</option>
            <option>RO</option>
            <option>RR</option>
            <option>SC</option>
            <option>SP</option>
            <option>SE</option>
            <option>TO</option>
        </select>

        <label>Produtos Fornecidos</label>
        <textarea rows="4" placeholder="Ex: Nintendo Switch OLED, Joy-Con, Pro Controller"></textarea>

        <button type="submit">
            Cadastrar Fornecedor
        </button>

    </form>

</div>

<footer>
    <p>© 2026 - Sistema de Cadastro de Fornecedores</p>
</footer>

</body>
</html>
