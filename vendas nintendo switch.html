<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Nintendo Switch - Vendas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    header {
      background: #e60012;
      color: white;
      text-align: center;
      padding: 25px;
    }

    nav {
      background: #111;
      text-align: center;
      padding: 15px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 12px;
      font-weight: bold;
    }

    nav a:hover {
      color: #e60012;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px #ccc;
    }

    h2 {
      color: #e60012;
      text-align: center;
    }

    label {
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    button {
      width: 100%;
      background: #e60012;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #111;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
    }

    th {
      background: #e60012;
      color: white;
      padding: 12px;
    }

    td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    .total {
      font-size: 22px;
      font-weight: bold;
      color: green;
      text-align: center;
      margin-top: 20px;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>Loja Nintendo Switch</h1>
  <p>Sistema de Vendas</p>
</header>

<nav>
  <a href="#venda">Nova Venda</a>
  <a href="#lista">Lista de Vendas</a>
</nav>

<div class="container" id="venda">
  <h2>Cadastrar Venda</h2>

  <label>Cliente:</label>
  <input type="text" id="cliente" placeholder="Nome do cliente">

  <label>Produto:</label>
  <select id="produto">
    <option value="">Selecione</option>
    <option value="2299">Nintendo Switch - R$ 2.299</option>
    <option value="2699">Nintendo Switch OLED - R$ 2.699</option>
    <option value="1499">Nintendo Switch Lite - R$ 1.499</option>
    <option value="499">Joy-Con - R$ 499</option>
    <option value="399">Pro Controller - R$ 399</option>
    <option value="299">Mario Kart 8 Deluxe - R$ 299</option>
  </select>

  <label>Quantidade:</label>
  <input type="number" id="quantidade" placeholder="Digite a quantidade">

  <label>Forma de pagamento:</label>
  <select id="pagamento">
    <option value="">Selecione</option>
    <option>Dinheiro</option>
    <option>Pix</option>
    <option>Cartão de Crédito</option>
    <option>Cartão de Débito</option>
  </select>

  <button onclick="cadastrarVenda()">Cadastrar Venda</button>
</div>

<div class="container" id="lista">
  <h2>Vendas Cadastradas</h2>

  <table>
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Produto</th>
        <th>Quantidade</th>
        <th>Pagamento</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tabelaVendas"></tbody>
  </table>

  <p class="total" id="totalGeral">Total geral: R$ 0,00</p>
</div>

<footer>
  <p>Site Nintendo Switch - Vendas</p>
</footer>

<script>
  let totalGeral = 0;

  function cadastrarVenda() {
    let cliente = document.getElementById("cliente").value;
    let produto = document.getElementById("produto");
    let preco = Number(produto.value);
    let nomeProduto = produto.options[produto.selectedIndex].text;
    let quantidade = Number(document.getElementById("quantidade").value);
    let pagamento = document.getElementById("pagamento").value;

    if (cliente === "" || preco === 0 || quantidade <= 0 || pagamento === "") {
      alert("Preencha todos os campos corretamente!");
      return;
    }

    let total = preco * quantidade;
    totalGeral += total;

    let tabela = document.getElementById("tabelaVendas");

    tabela.innerHTML += `
      <tr>
        <td>${cliente}</td>
        <td>${nomeProduto}</td>
        <td>${quantidade}</td>
        <td>${pagamento}</td>
        <td>R$ ${total.toFixed(2)}</td>
      </tr>
    `;

    document.getElementById("totalGeral").innerHTML =
      "Total geral: R$ " + totalGeral.toFixed(2);

    document.getElementById("cliente").value = "";
    document.getElementById("produto").value = "";
    document.getElementById("quantidade").value = "";
    document.getElementById("pagamento").value = "";

    alert("Venda cadastrada com sucesso!");
  }
</script>

</body>
</html>
